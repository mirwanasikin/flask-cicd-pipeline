name: Deploy to EC2

on:
  workflow_run:
    workflows: ["Build & Push GHCR"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            docker pull ghcr.io/${{ github.repository }}/flask:${{ github.event.workflow_run.head_branch }}

            docker stop flask_app || true
            docker rm flask_app || true

            docker run -d \
              --name flask_app \
              -p 5000:5000 \
              --restart always \
              ghcr.io/${{ github.repository }}/flask:${{ github.event.workflow_run.head_branch }}
